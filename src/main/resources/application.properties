# ---------- SPRING SECURITY + MICROSOFT ENTRA (AZURE AD) ----------

spring.security.oauth2.client.registration.azure.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.azure.client-secret=${SECRET_ID}
spring.security.oauth2.client.registration.azure.scope=openid,profile,email

spring.security.oauth2.client.provider.azure.issuer-uri=${AZURE_ISSUER_URI}

spring.datasource.url=jdbc:mysql://121.0.0.1:3306/local
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database=MYSQL
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.idleTimeout=60000
spring.main.allow-circular-references=true
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.datasource.hikari.maximumPoolSize=100
spring.datasource.hikari.maxLifetime=1800000
logging.pattern.console=%clr(%d{yy-MM-dd E HH:mm:ss.SSS}){blue} %clr(%-5p) %clr(${PID}){faint} %clr(---){faint} %clr\
  ([%8.15t]){cyan} %clr(%-40.40logger{0}%line){blue} %clr(:){red}   %clr(%m){faint}%n

server.port=8000
frontend.url=http://localhost:3000